name: Verification Gate

# Phase R5 — CI / GitHub Workflow Verification Gate
#
# Mirrors the exact lock checks that pass locally in Replit.
# Golden snapshot (tests/golden/r2-demo-snapshot.json) is committed to source.
# CI reads and verifies it but NEVER generates or updates it.
# To update the snapshot intentionally: run `npm run generate-snapshot` locally
# and commit the result.

on:
  push:
  pull_request:

jobs:

  # ── TypeScript: build · typecheck · test · demo ──────────────────────────
  node-verification:
    name: TypeScript — Build · Test · Demo
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (tsc)
        run: npm run build

      - name: Typecheck
        run: npm run typecheck

      - name: Test — 141 checks incl. golden snapshot regression
        run: npm test

      - name: Demo — deterministic sequence proof (both acts)
        run: npm run demo

      - name: Golden snapshot existence check
        run: |
          if [ ! -f tests/golden/r2-demo-snapshot.json ]; then
            echo "ERROR: tests/golden/r2-demo-snapshot.json is missing."
            echo "The golden snapshot must be committed to source and never deleted or renamed."
            echo "Restore the file and commit it before merging."
            exit 1
          fi

      - name: Golden snapshot integrity guard
        run: |
          git diff --exit-code tests/golden/ || {
            echo "ERROR: tests/golden/ was modified during CI."
            echo "The generate-snapshot script must never run in CI."
            echo "Run 'npm run generate-snapshot' locally and commit the result."
            exit 1
          }

  # ── .NET 8: restore · build · test ───────────────────────────────────────
  dotnet-verification:
    name: .NET 8 — Build · Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Cache .NET build artifacts
        uses: actions/cache@v4
        with:
          path: artifacts/
          key: ${{ runner.os }}-dotnet-artifacts-${{ hashFiles('**/*.csproj', 'FOTN.DeterministicRuntime.sln') }}
          restore-keys: |
            ${{ runner.os }}-dotnet-artifacts-

      - name: Restore
        run: dotnet restore FOTN.DeterministicRuntime.sln

      - name: Build
        run: dotnet build FOTN.DeterministicRuntime.sln --no-restore

      - name: Test
        run: dotnet test FOTN.DeterministicRuntime.sln --no-build
